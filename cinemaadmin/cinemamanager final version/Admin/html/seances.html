<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestion des Séances - Cinéma</title>
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/seances.css">
</head>

<body>
    <div class="layout">

        <main class="main-content">
            <header class="page-header">
                <h1>Séances</h1>
                <button id="btn-add-seance" class="btn btn-primary">+ Nouvelle séance</button>
            </header>

            <section class="filters-bar">
                <input type="text" id="filter-search" placeholder="Rechercher par film ou salle...">
                <select id="filter-statut">
                    <option value="">Tous les statuts</option>
                    <option value="Disponible">Disponible</option>
                    <option value="Complet">Complet</option>
                    <option value="Annulé">Annulé</option>
                </select>
                <input type="date" id="filter-date">
            </section>

            <section class="table-container">
                <table id="seances-table">
                    <thead>
                        <tr>
                            <th>Film</th>
                            <th>Salle</th>
                            <th>Date</th>
                            <th>Heure</th>
                            <th>Places (Dispo/Totales)</th>
                            <th>Statut</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="seances-tbody">
                        <!-- Les séances sont injectées ici par JS -->
                    </tbody>
                </table>
            </section>
        </main>
    </div>

    <!-- Fenêtre modale (Ajout/Modification) -->
    <div id="seance-modal" class="modal">
        <div class="modal-content">
            <h2 id="modal-title">Nouvelle séance</h2>
            <form id="seance-form">
                <input type="hidden" id="seance-id">

                <div class="form-group">
                    <label for="film-select">Film</label>
                    <select id="film-select" required>
                        <option value="">Sélectionner un film...</option>
                        <option value="Inception">Inception</option>
                        <option value="Interstellar">Interstellar</option>
                        <option value="Dune">Dune</option>
                        <option value="Avatar: La Voie de l'eau">Avatar: La Voie de l'eau</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="salle-select">Salle</label>
                    <select id="salle-select" required>
                        <option value="">Sélectionner une salle...</option>
                        <option value="Salle 1">Salle 1</option>
                        <option value="Salle 2">Salle 2</option>
                        <option value="Salle 3">Salle 3</option>
                        <option value="Salle IMAX">Salle IMAX</option>
                    </select>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="date-input">Date</label>
                        <input type="date" id="date-input" required>
                    </div>
                    <div class="form-group">
                        <label for="heure-input">Heure</label>
                        <input type="time" id="heure-input" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="places-input">Places totales</label>
                        <input type="number" id="places-input" min="1" required>
                    </div>
                    <div class="form-group">
                        <label for="prix-input">Prix (TND)</label>
                        <input type="number" step="0.5" id="prix-input" min="0" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="statut-select">Statut</label>
                    <select id="statut-select" required>
                        <option value="Disponible">Disponible</option>
                        <option value="Complet">Complet</option>
                        <option value="Annulé">Annulé</option>
                    </select>
                </div>

                <div class="form-actions">
                    <button type="button" id="btn-cancel" class="btn btn-secondary">Annuler</button>
                    <button type="submit" class="btn btn-primary">Enregistrer</button>
                </div>
            </form>
        </div>
    </div>

    <script src="../js/data.js"></script>
    <script src="../js/seances.js"></script>
</body>

</html>
