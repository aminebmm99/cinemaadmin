<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Admin</title>
    <link rel="stylesheet" href="../css/suivi.css">
</head>
<body>
    <div class="dashboard">
        <h1>Tableau de bord</h1>


        <div class="summary-grid">
            <div class="card" id="card-films">
                <h2>Films</h2>
                <p>Total films enregistrés</p>
                <strong>0</strong>
            </div>
            <div class="card" id="card-seances">
                <h2>Séances</h2>
                <p>Planifiées aujourd'hui</p>
                <strong>0</strong>
            </div>
            <div class="card" id="card-reservations">
                <h2>Réservations</h2>
                <p>Confirmées cette semaine</p>
                <strong>0</strong>
            </div>
            <div class="card" id="card-places">
                <h2>Places restantes</h2>
                <p>Disponibles dans le cinéma</p>
                <strong>0</strong>
            </div>
        </div>

        <div class="section">
            <h3>Dernières réservations</h3>
            <table class="table">
                <thead>
                    <tr>
                        <th>Code</th>
                        <th>Film</th>
                        <th>Date</th>
                        <th>Heure</th>
                        <th>Tickets</th>
                    </tr>
                </thead>
                <tbody>
                    <tr><td colspan="5" class="empty">Chargement...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script src="../js/data.js"></script>
    <script src="../js/suivi.js"></script>
</body>
</html>
