<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cinema Manager — Espace Utilisateur</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="user.css"/>
</head>
<body>


  <aside class="sidebar">
    <div class="sidebar-brand">
      <span class="brand-title">Cinema<br/>Manager</span>
    </div>
    <hr class="sidebar-divider"/>
    <nav class="sidebar-nav">
      <a href="#" class="nav-link active" data-section="films">Films</a>
      <a href="#" class="nav-link" data-section="reservations">Mes réservations</a>
    </nav>
    <div class="sidebar-bottom">
      <button class="btn-logout" onclick="window.location.href='../login.html'">Déconnecter</button>
    </div>
  </aside>


  <main class="main">


    <section id="section-films" class="section active">
      <h1 class="page-title">Films disponibles</h1>


      <div class="search-wrap">
        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input type="text" id="search-input" placeholder="Rechercher un film…" oninput="filterFilms()"/>
      </div>


      <div class="filters" id="filters">
        <button class="filter-btn active" onclick="setGenre('Tous', this)">Tous</button>
        <button class="filter-btn" onclick="setGenre('Action &amp; Sci-Fi', this)">Action &amp; Sci-Fi</button>
        <button class="filter-btn" onclick="setGenre('Drame &amp; Thriller', this)">Drame &amp; Thriller</button>
        <button class="filter-btn" onclick="setGenre('Animation', this)">Animation</button>
      </div>

      <!-- Films grid -->
      <div class="films-grid" id="films-grid"></div>
      <p class="no-results" id="no-results" style="display:none;">Aucun film trouvé.</p>
    </section>


    <section id="section-reservations" class="section">
      <h1 class="page-title">Mes réservations</h1>
      <div class="reservations-table-wrap">
        <table class="res-table">
          <thead>
            <tr>
              <th>CODE</th>
              <th>FILM</th>
              <th>DATE</th>
              <th>HEURE</th>
              <th>TICKETS</th>
              <th>STATUT</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="res-tbody"></tbody>
        </table>
        <p class="empty-res" id="empty-res" style="display:none;">Vous n'avez pas encore de réservations.</p>
      </div>
    </section>

  </main>


  <div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
    <div class="modal">
      <button class="modal-close" onclick="closeModalBtn()">✕</button>
      <div class="modal-poster" id="modal-poster"></div>
      <div class="modal-body">
        <h2 class="modal-title" id="modal-title"></h2>
        <p class="modal-meta" id="modal-meta"></p>
        <p class="modal-desc" id="modal-desc"></p>

        <div class="modal-form">
          <div class="form-row">
            <div class="form-group">
              <label>Séance</label>
              <select id="modal-seance"></select>
            </div>
            <div class="form-group">
              <label>Nombre de tickets</label>
              <div class="ticket-counter">
                <button type="button" onclick="changeTickets(-1)">−</button>
                <span id="ticket-count">1</span>
                <button type="button" onclick="changeTickets(1)">+</button>
              </div>
            </div>
          </div>

          <div class="modal-price-row">
            <span>Prix total</span>
            <span class="modal-price" id="modal-price">12,00 €</span>
          </div>

          <button class="btn-confirm" onclick="confirmBooking()">Confirmer la réservation</button>
        </div>
      </div>
    </div>
  </div>


  <div class="toast" id="toast"></div>

  <script src="user.js"></script>
</body>
</html>
