<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Connexion</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=DM+Sans:wght@300;400;500&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <div class="bg">
    <div class="orb orb1"></div>
    <div class="orb orb2"></div>
  </div>
  <div class="grid"></div>

  <div class="card">

    <div class="logo-wrap">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round"
          stroke-linejoin="round">
          <path d="M12 2L2 7l10 5 10-5-10-5z" />
          <path d="M2 17l10 5 10-5" />
          <path d="M2 12l10 5 10-5" />
        </svg>
      </div>
      <h1 id="card-title">Bienvenue</h1>
      <p class="subtitle" id="card-sub">Connectez-vous à votre espace</p>
    </div>

    <div class="role-toggle">
      <button class="role-btn active" id="btn-user" onclick="setRole('user')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"
          stroke-linejoin="round">
          <circle cx="12" cy="8" r="4" />
          <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7" />
        </svg>
        Utilisateur
      </button>
      <button class="role-btn" id="btn-admin" onclick="setRole('admin')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"
          stroke-linejoin="round">
          <path d="M12 2l3 6.5 7 1-5 4.8 1.2 7L12 18l-6.2 3.3L7 14.3 2 9.5l7-1z" />
        </svg>
        Administrateur
      </button>
    </div>

    <!-- Form -->
    <form id="login-form" onsubmit="handleSubmit(event)">

      <div class="form-group">
        <label for="email">Adresse e-mail</label>
        <div class="input-wrap">
          <input type="email" id="email" placeholder="exemple@domaine.com" required autocomplete="email" />
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
            stroke-linejoin="round">
            <rect x="2" y="4" width="20" height="16" rx="3" />
            <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7" />
          </svg>
        </div>
      </div>

      <div class="form-group">
        <label for="password">Mot de passe</label>
        <div class="input-wrap">
          <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password" />
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
            stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2" />
            <path d="M7 11V7a5 5 0 0 1 10 0v4" />
          </svg>
          <button type="button" class="eye-btn" id="eye-btn" onclick="togglePwd()" title="Afficher/masquer">
            <svg id="eye-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
              <circle cx="12" cy="12" r="3" />
            </svg>
          </button>
        </div>
      </div>

      <div class="form-group" id="admin-key-group" style="display:none;">
        <label for="admin-key">Clé d'accès administrateur</label>
        <div class="input-wrap">
          <input type="password" id="admin-key" placeholder="Clé secrète…" autocomplete="off" />
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
            stroke-linejoin="round">
            <path
              d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0 3 3L22 7l-3-3m-3.5 3.5L19 4" />
          </svg>
        </div>
      </div>

      <div class="options-row">
        <label class="remember">
          <input type="checkbox" id="remember" /> Se souvenir de moi
        </label>
        <a href="#" class="forgot">Mot de passe oublié ?</a>
      </div>

      <button type="submit" class="btn-submit" id="submit-btn">
        Se connecter
      </button>

      <div class="admin-badge" id="admin-badge">
        🔒 Mode Administrateur — Accès privilégié requis
      </div>
    </form>

    <div class="divider">ou</div>

    <div class="card-footer">
      Pas encore de compte ? <a href="#">Créer un compte</a>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="script.js"></script>
</body>

</html>
