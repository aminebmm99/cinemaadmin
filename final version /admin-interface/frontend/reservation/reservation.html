<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestion des Réservations - Cinéma</title>
    <link rel="stylesheet" href="reservation.css">
</head>

<body>
    <div class="layout">
        <main class="main-content">
            <header class="page-header">
                <div style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
                    <h1>Réservations</h1>
                    <button id="btn-add-reservation" class="btn btn-primary">+ Nouvelle réservation</button>
                </div>

            </header>

            <section class="filters-bar">
                <input type="text" id="filter-search" placeholder="Rechercher par nom, email, film ou code...">
                <select id="filter-statut">
                    <option value="">Tous les statuts</option>
                    <option value="Confirmée">Confirmée</option>
                    <option value="Attente">Attente</option>
                    <option value="Annulée">Annulée</option>
                </select>
                <input type="date" id="filter-date">
            </section>

            <section class="table-container">
                <table id="reservations-table">
                    <thead>
                        <tr>
                            <th>Code</th>
                            <th>Nom & Email</th>
                            <th>Film & Séance</th>
                            <th>Tickets</th>
                            <th>Total (TND)</th>
                            <th>Statut</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="reservations-tbody">
                        <!-- Réservations JS -->
                    </tbody>
                </table>
            </section>
        </main>
    </div>

    <!-- Fenêtre modale (Ajout/Modification) -->
    <div id="reservation-modal" class="modal">
        <div class="modal-content" style="max-width: 500px;">
            <h2 id="modal-title">Nouvelle Réservation</h2>
            <form id="reservation-form">
                <input type="hidden" id="reservation-id">

                <div class="form-row">
                    <div class="form-group">
                        <label for="nom-input">Nom complet</label>
                        <input type="text" id="nom-input" required>
                    </div>
                    <div class="form-group">
                        <label for="email-input">Email</label>
                        <input type="email" id="email-input" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="film-input">Film</label>
                    <select id="film-input" required>
                        <option value="">Sélectionner un film</option>
                    </select>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="date-input">Date</label>
                        <input type="date" id="date-input" required>
                    </div>
                    <div class="form-group">
                        <label for="heure-input">Seance ID  </label>
                        <!-- drop down list of seances d apres la bd dans le future  type select-->
                        <input type="text" id="heure-input" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="tickets-input">Billets</label>
                        <input type="number" id="tickets-input" min="1" value="1" required>
                    </div>
                    <div class="form-group">
                        <label for="total-input">Total (TND)</label>
                        <input type="number" step="0.5" id="total-input" min="0" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="statut-select">Statut</label>
                    <select id="statut-select" required>
                        <option value="Confirmée">Confirmée</option>
                        <option value="Attente">Attente</option>
                        <option value="Annulée">Annulée</option>
                    </select>
                </div>

                <div class="form-actions">
                    <button type="button" id="btn-cancel" class="btn btn-secondary">Annuler</button>
                    <button type="submit" class="btn btn-primary">Enregistrer</button>
                </div>
            </form>
        </div>
    </div>

    <script src="reservation.js"></script>
</body>

</html>
