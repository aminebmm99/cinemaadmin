<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Admin</title>
    <link rel="stylesheet" href="./suivi.css">
</head>
<body>
    <div class="dashboard">
        <h1>Tableau de bord</h1>


        <div class="summary-grid">
            <div class="card">
                <h2>Films</h2>
                <p>Nombre total de films enregistrés</p>
                <strong>0</strong>
            </div>
            <div class="card">
                <h2>Séances</h2>
                <p>Séances planifiées aujourd’hui</p>
                <strong>0</strong>
            </div>
            <div class="card">
                <h2>Réservations</h2>
                <p>Réservations confirmées cette semaine</p>
                <strong>0</strong>
            </div>
            <div class="card">
                <h2>Places restantes</h2>
                <strong>0</strong>
            </div>
        </div>

        <div class="section">
            <h3>Dernières réservations</h3>
            <table class="table">
                <thead>
                    <tr>
                        <th>Code</th>
                        <th>Film</th>
                        <th>Date</th>
                        <th>Heure</th>
                        <th>Tickets</th>
                    </tr>
                </thead>
            
            </table>
        </div>
    </div>
</body>
</html>
