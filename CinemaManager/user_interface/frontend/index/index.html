<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineMax - Cinema Booking</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0a0e1a;
            color: #ffffff;
            overflow: hidden;
            height: 100vh;
        }

        .iframe-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* Navbar iframe - fixed height at top */
        #navbarFrame {
            width: 100%;
            height: 80px;
            border: none;
            display: block;
            flex-shrink: 0;
        }

        /* Main content iframe - takes remaining space */
        #mainFrame {
            flex: 1;
            width: 100%;
            border: none;
            display: block;
            background: #0a0e1a;
        }
    </style>
</head>
<body>
    <div class="iframe-container">
        <iframe 
            id="navbarFrame"
            src="../navbar/navbar.html" 
            title="Navigation Bar"
            scrolling="no"
        ></iframe>
        <iframe 
            id="mainFrame"
            name="mainFrame"
            src="../main/main.html" 
            title="Main Content"
        ></iframe>
    </div>
</body>
</html>
