<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Navigation — CineMax</title>
  <meta name="description" content="CineMax Cinema Navigation Bar">
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../components/navbar/navbar.css">
</head>
<body>
  <!-- Navigation Bar -->
  <nav class="navbar-main">
    <div class="navbar-wrapper">
      <div class="navbar-content">
        
        <!-- Left Section: Logo -->
        <a href="../main/main.html" target="mainFrame" class="navbar-logo">
          CINEMAX
        </a>
        
        <!-- Center Section: Navigation Menu -->
        <ul class="navbar-menu">
          <li>
            <a href="../main/main.html" target="mainFrame" class="navbar-link" data-nav="home">
              Home
              <span class="navbar-underline"></span>
            </a>
          </li>
          <li>
            <a href="../movies/movies.html" target="mainFrame" class="navbar-link" data-nav="movies">
              Movies
              <span class="navbar-underline"></span>
            </a>
          </li>
          <li>
            <a href="../showtimes/showtimes.html" target="mainFrame" class="navbar-link" data-nav="showtimes">
              Showtimes
              <span class="navbar-underline"></span>
            </a>
          </li>
          <li>
            <a href="../history/history.html" target="mainFrame" class="navbar-link" data-nav="history">
              History
              <span class="navbar-underline"></span>
            </a>
          </li>
        </ul>
        
        <!-- Right Section: Search, Profile/Logout or Login -->
        <div class="navbar-right">
          <!-- Search Bar -->
          <div class="search-wrapper">
            <input
              type="text"
              id="searchInput"
              placeholder="Search movies..."
              class="search-input"
            >
            <button class="search-button" aria-label="Search movies" type="button">
              <svg class="search-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
              </svg>
            </button>
          </div>

          <div class="navbar-left" id="profileDropdown">
            <!-- Profile Button -->
            <a href="../main/profile.html" target="mainFrame" class="profile-button" aria-label="User profile">
              <span class="profile-avatar" id="profileAvatar">C</span>
              <span class="profile-name" id="profileName">user</span>
            </a>

            <!-- Disconnect Button -->
            <button class="nav-button disconnect-btn logout" title="Log out">
              Disconnect
            </button>
          </div>

          <a href="../login/login.html" target="_top" class="nav-button" id="loginButton" style="display: none;">
            Login
          </a>

          <!-- Mobile Hamburger -->
          <button id="hamburger" class="hamburger-menu" aria-label="Toggle menu">
            <span></span>
            <span></span>
            <span></span>
          </button>
        </div>
      </div>
    </div>
  </nav>

  <!-- Navbar Utilities Scripts -->
  <script src="../components/nav-sync.js"></script>
  <script src="../components/navbar-utils.js"></script>
  <script src="../components/navbar-sync-iframe.js"></script>
</body>
</html>
